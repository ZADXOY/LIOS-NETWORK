name: Build iOS IPA

# Builds an iOS IPA using a macOS GitHub Actions runner + Capacitor.
#
# ⚠️ IMPORTANT: To install the IPA on a real iPhone/iPad, you need:
# 1. An Apple Developer account ($99/year) — https://developer.apple.com
# 2. A signing certificate (.p12) and provisioning profile (.mobileprovision)
# 3. Add these as GitHub secrets (see below)
#
# Without signing secrets, the workflow builds an unsigned IPA (for simulators only).
#
# Required GitHub Secrets (for signed IPA):
#   IOS_CERTIFICATE_BASE64    — base64-encoded .p12 signing certificate
#   IOS_CERTIFICATE_PASSWORD  — password for the .p12 file
#   IOS_PROVISIONING_PROFILE_BASE64 — base64-encoded .mobileprovision file
#   IOS_TEAM_ID               — your Apple Developer Team ID (e.g. ABCD1234EF)
#   IOS_BUNDLE_ID             — e.g. com.lastisland.survivorcomms

on:
  push:
    branches: [main, master]
    paths:
      - "ios-project/**"
      - ".github/workflows/build-ipa.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ipa:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Install iOS project dependencies
        working-directory: ./ios-project
        run: npm install

      - name: Add iOS platform
        working-directory: ./ios-project
        run: npx cap add ios || true

      - name: Sync web assets to iOS
        working-directory: ./ios-project
        run: npx cap sync ios

      - name: Decode signing certificate (if provided)
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: |
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12

      - name: Decode provisioning profile (if provided)
        if: env.IOS_PROVISIONING_PROFILE_BASE64 != ''
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/build.mobileprovision

      - name: Import certificate to keychain (if provided)
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "build" build.keychain

      - name: Build IPA (signed)
        if: env.IOS_CERTIFICATE_BASE64 != ''
        working-directory: ./ios-project/ios/App
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
        run: |
          # Update project settings with team ID and bundle ID
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archivePath App.xcarchive archive -quiet CODE_SIGN_IDENTITY="iPhone Distribution" CODE_SIGNING_REQUIRED=YES CODE_SIGNING_ALLOWED=YES DEVELOPMENT_TEAM="$IOS_TEAM_ID" PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID"
          xcodebuild -exportArchive -archivePath App.xcarchive -exportOptionsPlist ExportOptions.plist -exportPath ./build -quiet
          cp ./build/App.ipa ../../last-island.ipa

      - name: Build IPA (unsigned, for simulator)
        if: env.IOS_CERTIFICATE_BASE64 == ''
        working-directory: ./ios-project/ios/App
        run: |
          # Build for simulator (no signing needed)
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphonesimulator -derivedDataPath ./build -quiet CODE_SIGNING_ALLOWED=NO
          # Find the .app and package it as an IPA
          APP_PATH=$(find ./build -name "App.app" -type d | head -1)
          mkdir -p ./Payload
          cp -r "$APP_PATH" ./Payload/
          cd ./Payload && zip -r ../last-island.ipa . && cd ..
          cp last-island.ipa ../../last-island.ipa

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: last-island-ipa
          path: ./ios-project/last-island.ipa
          retention-days: 90

      - name: Create GitHub Release with IPA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ipa-${{ github.run_number }}
          name: "Last Island IPA Build #${{ github.run_number }}"
          files: ./ios-project/last-island.ipa
          body: |
            ## Last Island — iOS IPA

            ### Unsigned IPA (simulator only)
            If this is an unsigned build, it only works on the iOS Simulator.
            To install on a real device, you need:
            1. An Apple Developer account ($99/year)
            2. Add signing secrets to GitHub (see workflow file for details)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
