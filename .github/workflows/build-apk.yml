name: Build Android APK (Debug)

# Builds a debug APK from your Last Island web app using Bubblewrap.
# Debug APKs are unsigned but installable on any Android phone
# (enable "Install from unknown apps" in Settings).
#
# No keystore or secrets required — just trigger and download.

on:
  push:
    branches: [main, master]
    paths:
      - "twa-manifest.json"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize TWA project from manifest
        run: |
          # Use 'yes' to auto-answer ALL interactive prompts (JDK install + Android SDK install)
          yes | bubblewrap init --manifest ./twa-manifest.json --directory ./twa-build --force

      - name: Build debug APK
        working-directory: ./twa-build
        run: |
          # Build the debug APK (no signing required)
          ./gradlew assembleDebug --no-daemon -x lint

      - name: Find the built APK
        run: |
          APK_PATH=$(find ./twa-build -name "*.apk" -type f | head -1)
          echo "Found APK at: $APK_PATH"
          cp "$APK_PATH" ./last-island.apk
          ls -la ./last-island.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: last-island-apk
          path: ./last-island.apk
          retention-days: 90

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Last Island APK Build #${{ github.run_number }}"
          files: ./last-island.apk
          body: |
            ## Last Island — Survivor Comms Network

            Download the APK below and install it on your Android phone.

            ### Installation
            1. Download `last-island.apk`
            2. On your phone: Settings → Apps → Special access → Install unknown apps → enable for your browser
            3. Open the APK file to install
            4. Launch "Last Island" from your app drawer

            ### Features
            - Real-time survivor comms (7 channels)
            - Legion system with Captain / Vice Captain / Elite ranks
            - Raid alarm with push notifications (works when app is closed)
            - Admin panel for user verification & legion approval
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
