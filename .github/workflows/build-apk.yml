name: Build Android APK (Debug)

# Builds a debug APK using a pre-configured TWA project.
# The TWA project files are committed to the repo (in the twa-project/ folder),
# so no bubblewrap init is needed — just gradle build.

on:
  push:
    branches: [main, master]
    paths:
      - "twa-project/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Build debug APK
        working-directory: ./twa-project
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon -x lint

      - name: Find the built APK
        run: |
          APK_PATH=$(find ./twa-project -name "*.apk" -type f | head -1)
          echo "Found APK at: $APK_PATH"
          cp "$APK_PATH" ./last-island.apk
          ls -la ./last-island.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: last-island-apk
          path: ./last-island.apk
          retention-days: 90

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Last Island APK Build #${{ github.run_number }}"
          files: ./last-island.apk
          body: |
            ## Last Island — Survivor Comms Network

            Download the APK below and install it on your Android phone.

            ### Installation
            1. Download `last-island.apk`
            2. On your phone: Settings → Apps → Special access → Install unknown apps → enable for your browser
            3. Open the APK file to install
            4. Launch "Last Island" from your app drawer

            ### Features
            - Real-time survivor comms (7 channels)
            - Legion system with Captain / Vice Captain / Elite ranks
            - Public/Private legions with password protection
            - Join approval flow
            - Raid alarm with push notifications
            - Admin panel for user verification & legion approval
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
