name: Build Android APK (Debug)

# Builds a debug APK from your Last Island web app using Bubblewrap.
# Debug APKs are unsigned but installable on any Android phone.
# No keystore or secrets required.

on:
  push:
    branches: [main, master]
    paths:
      - "twa-manifest.json"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize TWA project (skip interactive prompts)
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          # Create a bubblewrap config pointing to the pre-installed JDK and Android SDK
          # so Bubblewrap doesn't prompt to download them
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' "$JAVA_HOME" "$ANDROID_HOME" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json
          # Pre-create the build directory so Bubblewrap doesn't prompt for it
          mkdir -p ./twa-build
          # Initialize the TWA project — pipe 'y' for any remaining prompts
          echo "y" | bubblewrap init --manifest ./twa-manifest.json --directory ./twa-build --force

      - name: Build debug APK
        working-directory: ./twa-build
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          # Update the gradle.properties to use the system JDK + Android SDK
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties
          ./gradlew assembleDebug --no-daemon -x lint

      - name: Find the built APK
        run: |
          APK_PATH=$(find ./twa-build -name "*.apk" -type f | head -1)
          echo "Found APK at: $APK_PATH"
          cp "$APK_PATH" ./last-island.apk
          ls -la ./last-island.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: last-island-apk
          path: ./last-island.apk
          retention-days: 90

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Last Island APK Build #${{ github.run_number }}"
          files: ./last-island.apk
          body: |
            ## Last Island — Survivor Comms Network

            Download the APK below and install it on your Android phone.

            ### Installation
            1. Download `last-island.apk`
            2. On your phone: Settings → Apps → Special access → Install unknown apps → enable for your browser
            3. Open the APK file to install
            4. Launch "Last Island" from your app drawer

            ### Features
            - Real-time survivor comms (7 channels)
            - Legion system with Captain / Vice Captain / Elite ranks
            - Public/Private legions with password protection
            - Join approval flow (Captain/Vice Captain approve)
            - Raid alarm with push notifications (works when app is closed)
            - Admin panel for user verification & legion approval
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
