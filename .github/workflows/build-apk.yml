name: Build Android APK

# This workflow builds a signed Android APK from your Last Island web app using
# Bubblewrap (Google's Trusted Web Activity tool). The APK wraps your deployed
# PWA into a native Android app.
#
# PREREQUISITES (one-time setup):
# 1. Deploy your app to Vercel (or any HTTPS host) — note the URL
# 2. Update twa-manifest.json with your real URL (replace last-island-chat.vercel.app)
# 3. Generate a signing keystore (see APK_BUILD_GUIDE.md) and add these GitHub secrets:
#    - ANDROID_KEYSTORE_BASE64  (base64-encoded .keystore file)
#    - ANDROID_KEYSTORE_PASSWORD
#    - ANDROID_KEY_ALIAS  (usually "android")
#    - ANDROID_KEY_PASSWORD
# 4. Push to GitHub → the workflow runs automatically

on:
  push:
    branches: [main, master]
    paths:
      - "twa-manifest.json"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch: # allows manual trigger from the Actions tab

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Decode signing keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/android.keystore
          echo "Keystore decoded to /tmp/android.keystore"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build the APK with Bubblewrap
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Initialize the TWA project from the manifest
          bubblewrap init --manifest ./twa-manifest.json --directory ./twa-build

          cd ./twa-build

          # Build the signed APK (answers "yes" to prompts automatically)
          # If no keystore secrets are set, this builds an unsigned debug APK instead
          if [ -f /tmp/android.keystore ]; then
            echo "Building SIGNED release APK..."
            bubblewrap build --signing-key-path /tmp/android.keystore \
              --signing-key-alias "$ANDROID_KEY_ALIAS" \
              --signing-key-password "$ANDROID_KEY_PASSWORD" \
              --keystore-password "$ANDROID_KEYSTORE_PASSWORD" \
              --skip-gradle-build false
          else
            echo "No keystore found — building UNSIGNED debug APK..."
            bubblewrap build --skip-gradle-build false
          fi

      - name: Find the built APK
        id: find-apk
        run: |
          APK_PATH=$(find ./twa-build -name "*.apk" -type f | head -1)
          echo "Found APK at: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          # Copy to a known location with a clean name
          cp "$APK_PATH" ./last-island.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: last-island-apk
          path: ./last-island.apk
          retention-days: 90

      - name: Create GitHub Release with APK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Last Island APK Build #${{ github.run_number }}"
          files: ./last-island.apk
          body: |
            ## Last Island — Survivor Comms Network

            Download the APK below and install it on your Android phone.

            ### Installation
            1. Download `last-island.apk`
            2. On your phone, enable "Install from unknown sources" in Settings
            3. Open the APK file to install
            4. Launch "Last Island" from your app drawer

            ### What's included
            - Real-time survivor comms (7 channels)
            - Legion system with Captain / Vice Captain / Elite ranks
            - Raid alarm with push notifications (works when app is closed)
            - Admin panel for user verification & legion approval
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
