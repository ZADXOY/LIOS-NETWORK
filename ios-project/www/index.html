<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Last Island</title>
  <style>
    body { margin:0; background:#161310; height:100vh; display:flex; align-items:center; justify-content:center; }
    .loader { text-align:center; color:#c2502a; font-family:monospace; }
    .icon { font-size:64px; animation: flicker 3s ease-in-out infinite; }
    @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:0.7} }
  </style>
</head>
<body>
  <div class="loader">
    <div class="icon">🔥</div>
    <div style="margin-top:16px;letter-spacing:2px;">LAST ISLAND</div>
    <div style="margin-top:8px;font-size:12px;opacity:0.6;">Loading…</div>
  </div>
  <script>window.location.href='https://lios-network.vercel.app';</script>
</body>
</html>
